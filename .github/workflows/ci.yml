name: build

on:
  push:
    branches:
    tags:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: checkout
        uses: actions/checkout@v6

      - name: build and test
        run: go test -race -timeout=100s -covermode=atomic -coverprofile=coverage.out ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
