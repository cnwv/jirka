# Jira TUI Dashboard — Example Configuration
#
# This is a demo config with stub tickets. To connect your Jira:
#   1. Copy this file:  cp config.example.yaml config.yaml
#   2. Edit config.yaml — replace stubs with your JQL queries
#   3. Set up .env with JIRA_URL, JIRA_TOKEN, JIRA_USER_EMAIL
#
# YAML reference:
#   - `layout` is optional; default is rows: 3, cols: 2 (6 panels)
#   - Total panels must equal rows × cols (max 6, e.g. 1×1, 2×2, 3×2, 2×3)
#   - Keys 1–N focus panels; key N+1 focuses the detail view
#   - Each panel has either `jql` (flat list) or `sections` (grouped)
#   - Use {user} in JQL — replaced with JIRA_USER_EMAIL at startup
#   - Colors: red, blue, green, yellow, orange, purple, teal (or raw ANSI like 38;5;203)
#   - `stubs` show demo tickets when no Jira is configured

layout:
  rows: 3
  cols: 2

panels:
  - title: "Verification"
    color: blue
    stubs:
      - key: "DEMO-101"
        summary: "Payment timeout on deposit flow"
        status: "Open"
        priority: "High"
        type: "Bug"
      - key: "DEMO-102"
        summary: "Player balance mismatch after withdrawal"
        status: "Verification"
        priority: "Critical"
        type: "Bug"
      - key: "DEMO-103"
        summary: "Game provider integration error"
        status: "Open"
        priority: "Major"
        type: "Problem"

  - title: "Backlog"
    color: yellow
    sections:
      - name: LIVE
        color: red
        stubs:
          - key: "DEMO-201"
            summary: "Investigate slow report generation"
            status: "Backlog"
            priority: "Major"
            type: "Bug"
          - key: "DEMO-202"
            summary: "Review deposit callback logs"
            status: "Backlog"
            priority: "Medium"
            type: "Task"
      - name: OPERATIONAL
        color: blue
        stubs:
          - key: "DEMO-203"
            summary: "Update monitoring alerts"
            status: "Backlog"
            priority: "Low"
            type: "Task"

  - title: "In Progress"
    color: green
    sections:
      - name: LIVE
        color: red
        stubs:
          - key: "DEMO-301"
            summary: "Fix withdrawal callback handler"
            status: "In Progress"
            priority: "High"
            type: "Bug"
      - name: OPERATIONAL
        color: blue
        stubs:
          - key: "DEMO-302"
            summary: "Deploy hotfix to staging"
            status: "In Progress"
            priority: "Medium"
            type: "Task"

  - title: "Blocked/WFC"
    color: orange
    stubs:
      - key: "DEMO-401"
        summary: "Waiting for operator config"
        status: "Waiting for customer"
        priority: "High"
        type: "Bug"
      - key: "DEMO-402"
        summary: "Blocked by third-party API downtime"
        status: "Blocked"
        priority: "Critical"
        type: "Bug"

  - title: "Internal"
    color: purple
    sections:
      - name: AI
        color: green
        stubs:
          - key: "DEMO-501"
            summary: "Train classification model on tickets"
            status: "In Progress"
            priority: "Medium"
            type: "Task"
      - name: RCA
        color: blue
        stubs:
          - key: "DEMO-502"
            summary: "Root cause analysis: payment failures"
            status: "Open"
            priority: "High"
            type: "Investigation"

  - title: "Code Review"
    color: teal
    sections:
      - name: CODE REVIEW
        color: green
        stubs:
          - key: "DEMO-601"
            summary: "Fix race condition in bonus service"
            status: "Code Review"
            priority: "High"
            type: "Bug"
      - name: TESTING
        color: yellow
        stubs:
          - key: "DEMO-602"
            summary: "Add logging to payment callbacks"
            status: "Testing"
            priority: "Medium"
            type: "Task"
      - name: MERGE REQUEST
        color: orange
        # no stubs — shows EMPTY
